<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>英语学习中心</title>
    <style>
        :root {
            --bg: #020617; --card-bg: #0f172a; --border: #1e293b; --text: #f8fafc;
            --accent: #3b82f6; --homework: #f59e0b; --success: #10b981;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--accent); margin: 0; }
        
        /* 统一返回按钮样式 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #0ea5e9;
            border: 2px solid #0ea5e9;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(14, 165, 233, 0.05);
        }
        .back-btn:hover {
            background: rgba(14, 165, 233, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        .back-btn:active { transform: translateY(0); }
        .back-btn svg { width: 18px; height: 18px; }
        
        .lesson-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .lesson-header { display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .lesson-date { font-weight: bold; font-size: 1.2em; color: var(--accent); }
        .status-tag { padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 800; }
        .status-pending { background: rgba(245, 158, 11, 0.1); color: var(--homework); border: 1px solid var(--homework); }
        .status-done { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        
        h3 { color: #94a3b8; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; margin-bottom: 15px; }
        ul { margin: 10px 0; padding-left: 20px; }
        li { margin-bottom: 8px; color: #f8fafc; font-size: 1.05em; }
        
        .homework-box { background: rgba(245, 158, 11, 0.05); border-radius: 12px; padding: 20px; margin-top: 25px; }
        .homework-box h3 { color: var(--homework); }
        .homework-box p { font-weight: 500; font-size: 1.1em; margin: 0; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇬🇧 英语学习中心</h1>
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                返回空间
            </a>
        </header>

        <div class="lesson-card">
            <div class="lesson-header">
                <span class="lesson-date">📚 本周任务</span>
                <span class="status-tag status-pending">PENDING</span>
            </div>
            
            <div class="section">
                <h3>📖 阅读任务</h3>
                <ul>
                    <li>Write a summary paragraph about Anatole Latuile, Un Max de Surprises.</li>
                    <li>总结段落需要包含：主要人物、关键事件、你的感受</li>
                </ul>
            </div>

            <div class="homework-box">
                <h3>✍️ 作业要求</h3>
                <p>
                    <strong>1. 阅读理解：</strong>阅读 Anatole Latuile 故事<br>
                    <strong>2. 写作练习：</strong>写一个总结段落<br>
                    <strong>3. 字数要求：</strong>80-100 词
                </p>
            </div>
        </div>
            
        <footer style="text-align:center; color:#475569; margin-top:50px; font-size:0.85em; border-top:1px solid #1e293b; padding-top:20px;">
            学习空间 · 由 Pi 🥧 智能驱动
        </footer>
    </div>
</body>
</html>
