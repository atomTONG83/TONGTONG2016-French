<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H70 - La Féodalité · Révision</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        :root { --bg: #030712; --primary: #0ea5e9; --secondary: #818cf8; --accent: #fbbf24; --danger: #ef4444; --glass: rgba(15, 23, 42, 0.6); --border: rgba(56, 189, 248, 0.2); --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        .badge { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--primary); border: 1px solid var(--primary); padding: 4px 15px; display: inline-block; margin-bottom: 10px; }
        h1 { font-family: 'Orbitron'; font-weight: 900; font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 20px rgba(14, 165, 233, 0.5); }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
        .question-card { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px); display: none; }
        .question-card.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .question-number { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary); margin-bottom: 15px; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; line-height: 1.6; }
        .options { display: grid; gap: 12px; }
        .option { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px 20px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .option:hover { border-color: var(--primary); background: rgba(14, 165, 233, 0.1); }
        .option.correct { border-color: var(--success); background: rgba(34, 197, 94, 0.2); }
        .option.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.2); }
        .feedback { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: 700; display: none; }
        .feedback.correct { background: rgba(34, 197, 94, 0.2); border: 1px solid var(--success); color: var(--success); }
        .feedback.wrong { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: var(--danger); }
        .btn-next { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; padding: 12px 30px; border: none; border-radius: 25px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; display: none; }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4); }
        .score-card { text-align: center; padding: 40px; display: none; }
        .score-value { font-family: 'Orbitron'; font-size: 4rem; color: var(--accent); text-shadow: 0 0 30px rgba(251, 191, 36, 0.4); }
        .btn-retry { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; padding: 15px 40px; border: none; border-radius: 25px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; }
        .back-link { text-align: center; margin-top: 30px; }
        .back-link a { color: var(--primary); text-decoration: none; font-size: 0.9rem; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <header>
            <div class="badge">H70 · HISTOIRE</div>
            <h1>🏰 La Féodalité</h1>
            <p style="color: #64748b; margin-top: 10px;">Moyen Âge · Organisation de la société</p>
        </header>

        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div style="text-align: right; font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">
            Question <span id="current">1</span> / <span id="total">15</span>
        </div>

        <div id="quiz-container"></div>

        <div class="score-card" id="score-card">
            <h2 style="font-family: 'Orbitron'; margin-bottom: 20px;">🎉 Quiz Terminé!</h2>
            <div class="score-value" id="score">0%</div>
            <p style="color: #64748b; margin: 20px 0;">Tu as répondu correctement à <span id="correct-count">0</span> questions sur <span id="total-count">0</span></p>
            <button class="btn-retry" onclick="location.reload()">🔄 Recommencer</button>
            <div class="back-link" style="margin-top: 30px;">
                <a href="exam_hub.html">← Retour au centre de révision</a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Au Moyen Âge, la société est organisée en combien d'ordres?",
                options: ["Deux ordres", "Trois ordres", "Quatre ordres", "Cinq ordres"],
                correct: 1,
                explanation: "La société médiévale compte trois ordres: ceux qui dirigent et combattent, ceux qui prient, et ceux qui travaillent."
            },
            {
                q: "Qui fait partie du premier ordre (ceux qui dirigent et combattent)?",
                options: ["Les moines et les prêtres", "Les commerçants et les artisans", "Les nobles, rois, seigneurs et chevaliers", "Les paysans"],
                correct: 2,
                explanation: "Le premier ordre comprend les nobles: rois, seigneurs et chevaliers qui dirigent et combattent."
            },
            {
                q: "Qui compose le clergé (ceux qui prient)?",
                options: ["Les rois et les seigneurs", "Les moines, prêtres et évêques", "Les commerçants et les paysans", "Les chevaliers"],
                correct: 1,
                explanation: "Le clergé est composé des moines, prêtres et évêques qui prient pour la société."
            },
            {
                q: "Qui fait partie du troisième ordre (ceux qui travaillent)?",
                options: ["Les nobles et les chevaliers", "Les évêques et les moines", "Les commerçants, artisans et paysans", "Les rois et les seigneurs"],
                correct: 2,
                explanation: "Le troisième ordre comprend tous ceux qui travaillent: commerçants, artisans et paysans."
            },
            {
                q: "Comment s'appelle le territoire dirigé par un seigneur?",
                options: ["Un royaume", "Un fief", "Un duché", "Une province"],
                correct: 1,
                explanation: "Le fief est le territoire qu'un seigneur possède et dirige."
            },
            {
                q: "Qu'est-ce qu'un grand seigneur?",
                options: ["Un seigneur qui prie beaucoup", "Un seigneur puissant qui possède de grands territoires (comtés, duchés)", "Un seigneur qui travaille la terre", "Un seigneur qui est moine"],
                correct: 1,
                explanation: "Un grand seigneur est puissant et possède de grands territoires comme des comtés ou des duchés."
            },
            {
                q: "Qu'est-ce qu'un suzerain?",
                options: ["Un seigneur moins puissant", "Un seigneur puissant par rapport à un seigneur moins puissant (son vassal)", "Un roi", "Un évêque"],
                correct: 1,
                explanation: "Le suzerain est le grand seigneur par rapport à un seigneur moins puissant, son vassal."
            },
            {
                q: "Qu'est-ce qu'un vassal?",
                options: ["Un seigneur très puissant", "Un seigneur moins puissant qui promet fidélité à un suzerain", "Un roi", "Un paysan"],
                correct: 1,
                explanation: "Le vassal est un seigneur moins puissant qui doit promettre fidélité à son suzerain."
            },
            {
                q: "Que doit promettre le vassal à son suzerain?",
                options: ["De lui donner de l'argent", "De lui être toujours fidèle", "De prier pour lui", "De travailler ses terres"],
                correct: 1,
                explanation: "Le vassal doit promettre à son suzerain de lui être toujours fidèle."
            },
            {
                q: "Que donne le suzerain à son vassal en échange de sa fidélité?",
                options: ["De l'or et des bijoux", "Un fief et sa protection", "Des armes", "Des chevaux"],
                correct: 1,
                explanation: "En échange de la fidélité du vassal, le suzerain lui assure sa protection et lui donne un fief."
            },
            {
                q: "Comment s'appelle la relation entre un suzerain et son vassal?",
                options: ["La démocratie", "La féodalité", "La monarchie", "La république"],
                correct: 1,
                explanation: "La féodalité est le système politique et social basé sur la relation entre suzerains et vassaux."
            },
            {
                q: "Qui protège le clergé?",
                options: ["Les paysans", "Les commerçants", "Les nobles (ceux qui combattent)", "Personne"],
                correct: 2,
                explanation: "Les nobles (premier ordre) protègent le clergé et tous les autres ordres."
            },
            {
                q: "Qui nourrit les autres ordres?",
                options: ["Les nobles", "Le clergé", "Ceux qui travaillent (paysans, artisans)", "Les rois"],
                correct: 2,
                explanation: "Ceux qui travaillent (troisième ordre) nourrissent tous les autres ordres de la société."
            },
            {
                q: "Comment est divisé le royaume au Moyen Âge?",
                options: ["En départements", "En régions", "En très nombreux fiefs dirigés par des seigneurs", "En provinces"],
                correct: 2,
                explanation: "Le royaume est divisé en de très nombreux fiefs dirigés par des seigneurs."
            },
            {
                q: "Quelle est la période historique de la féodalité?",
                options: ["L'Antiquité", "Le Moyen Âge", "La Renaissance", "L'époque moderne"],
                correct: 1,
                explanation: "La féodalité est le système d'organisation de la société au Moyen Âge."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function renderQuestion() {
            const container = document.getElementById('quiz-container');
            const q = questions[currentQuestion];
            
            container.innerHTML = `
                <div class="question-card active">
                    <div class="question-number">QUESTION ${currentQuestion + 1}</div>
                    <div class="question-text">${q.q}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `<div class="option" onclick="selectOption(${i})">${opt}</div>`).join('')}
                    </div>
                    <div class="feedback" id="feedback"></div>
                    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question Suivante →</button>
                </div>
            `;
            
            document.getElementById('current').textContent = currentQuestion + 1;
            document.getElementById('progress').style.width = `${((currentQuestion) / questions.length) * 100}%`;
            answered = false;
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;
            
            const options = document.querySelectorAll('.option');
            const q = questions[currentQuestion];
            const feedback = document.getElementById('feedback');
            const btnNext = document.getElementById('btn-next');
            
            if (index === q.correct) {
                options[index].classList.add('correct');
                feedback.innerHTML = `✅ Correct! ${q.explanation}`;
                feedback.classList.add('correct');
                score++;
            } else {
                options[index].classList.add('wrong');
                options[q.correct].classList.add('correct');
                feedback.innerHTML = `❌ Incorrect. ${q.explanation}`;
                feedback.classList.add('wrong');
            }
            
            feedback.style.display = 'block';
            btnNext.style.display = 'inline-block';
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                showScore();
            } else {
                renderQuestion();
            }
        }

        function showScore() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('score-card').style.display = 'block';
            document.getElementById('progress').style.width = '100%';
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('score').textContent = `${percentage}%`;
            document.getElementById('correct-count').textContent = score;
            document.getElementById('total-count').textContent = questions.length;
        }

        renderQuestion();
    </script>
</body>
</html>
