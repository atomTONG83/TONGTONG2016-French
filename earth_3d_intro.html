<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🌍 3D 地球 - 欧洲国家学习</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root {
            --bg: #030712;
            --primary: #10b981;
            --secondary: #059669;
            --accent: #fbbf24;
            --glass: rgba(16, 185, 129, 0.1);
            --border: rgba(16, 185, 129, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: rotateX(45deg);
            animation: moveGrid 20s linear infinite;
        }
        
        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        /* 统一返回按钮样式 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #0ea5e9;
            border: 2px solid #0ea5e9;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(14, 165, 233, 0.05);
            z-index: 1000;
        }
        .back-btn:hover {
            background: rgba(14, 165, 233, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        .back-btn:active { transform: translateY(0); }
        .back-btn svg { width: 18px; height: 18px; }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .week-badge {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 5px 18px;
            display: inline-block;
            margin-bottom: 12px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 20px;
        }
        
        h1 {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.9rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
            background: linear-gradient(135deg, #10b981, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h1 small {
            font-size: 1rem;
            opacity: 0.7;
            display: block;
            margin-top: 8px;
            -webkit-text-fill-color: #94a3b8;
        }
        
        .instructions {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .btn-launch {
            display: block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            font-weight: 700;
            font-family: 'Orbitron';
            font-size: 1.3rem;
            box-shadow: 0 8px 0 #047857;
            transition: all 0.1s;
            margin-top: 30px;
        }
        .btn-launch:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #047857;
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding-bottom: 40px;
            color: #334155;
            font-size: 0.65rem;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="container">
        <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回空间
        </a>
        
        <header>
            <div class="week-badge">3D INTERACTIVE</div>
            <h1>🌍 3D 地球<small>欧洲国家学习</small></h1>
        </header>
        
        <div class="instructions">
            <p>🖱️ 鼠标拖拽旋转 · 🔍 滚轮缩放 · ⚡ 双击重置</p>
            <p style="margin-top: 10px;">📱 单指旋转 · 双指缩放</p>
        </div>
        
        <a href="earth_europe_learning_v14.html" class="btn-launch">
            🚀 进入 3D 地球
        </a>
        
        <footer>V1.0 | © TONGTONG's SPACE 2026 | 3D EARTH</footer>
    </div>
</body>
</html>
