<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONGTONG's SCHOOL VOCABULARY | 童童学校生词本</title>
    <style>
        :root {
            --bg: #020617; --card-bg: #0f172a; --border: #1e293b; --text: #f8fafc;
            --accent: #0ea5e9; --success: #10b981; --warning: #f59e0b;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--accent); margin: 0; }
        
        /* 统一返回按钮样式 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #0ea5e9;
            border: 2px solid #0ea5e9;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(14, 165, 233, 0.05);
        }
        .back-btn:hover {
            background: rgba(14, 165, 233, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .stat-label { color: #94a3b8; font-size: 0.9em; }
        
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .word-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 25px; transition: all 0.2s; }
        .word-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 24px rgba(14, 165, 233, 0.2); }
        .word-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .word-title { font-size: 1.4em; font-weight: bold; color: var(--accent); }
        .word-level { padding: 4px 12px; border-radius: 20px; font-size: 0.75em; font-weight: 800; }
        .level-1 { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .level-2 { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .level-3 { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .level-4 { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .word-definition { color: #94a3b8; font-size: 0.9em; margin-bottom: 10px; font-style: italic; }
        .word-next { color: #64748b; font-size: 0.85em; }
        .word-next strong { color: var(--accent); }
        
        footer { text-align: center; color: #475569; margin-top: 50px; font-size: 0.85em; border-top: 1px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 童童学校生词本</h1>
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                返回空间
            </a>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-words">0</div>
                <div class="stat-label">总词汇量</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="mastered-words" style="color: var(--success);">0</div>
                <div class="stat-label">已掌握 (等级 4)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="learning-words" style="color: var(--warning);">0</div>
                <div class="stat-label">学习中 (等级 1-3)</div>
            </div>
        </div>
        
        <div class="vocab-grid" id="vocab-grid">
            <!-- 词汇卡片将通过 JavaScript 生成 -->
        </div>
        
        <footer>
            童童成长空间 · 由 Pi 🥧 智能驱动
        </footer>
    </div>

    <script>
        // 词汇数据
        const vocabularyData = [
            {"word": "Équilibre", "lvl": 4, "next": "2026-03-20", "definition": "平衡，均衡"},
            {"word": "Analyse", "lvl": 3, "next": "2026-03-07", "definition": "分析"},
            {"word": "Prénom", "lvl": 3, "next": "2026-03-09", "definition": "名字"},
            {"word": "Désert", "lvl": 4, "next": "2026-03-18", "definition": "沙漠； deserted"},
            {"word": "Isolant", "lvl": 4, "next": "2026-03-16", "definition": "绝缘的，隔热的"},
            {"word": "Conscience", "lvl": 4, "next": "2026-03-16", "definition": "意识，良心"},
            {"word": "Astronomie", "lvl": 4, "next": "2026-03-15", "definition": "天文学"},
            {"word": "créatif", "lvl": 1, "next": "2026-03-07", "definition": "有创造力的"},
            {"word": "imagination", "lvl": 2, "next": "2026-03-10", "definition": "想象力"},
            {"word": "curieux", "lvl": 3, "next": "2026-03-12", "definition": "好奇的"},
            {"word": "découverte", "lvl": 4, "next": "2026-03-20", "definition": "发现"},
            {"word": "expérience", "lvl": 4, "next": "2026-03-18", "definition": "经验；实验"}
        ];

        // 生成词汇卡片
        function generateCards() {
            const grid = document.getElementById('vocab-grid');
            let html = '';
            
            vocabularyData.forEach(item => {
                const levelClass = `level-${item.lvl}`;
                const levelText = item.lvl === 4 ? '已掌握' : `等级 ${item.lvl}`;
                
                html += `
                    <div class="word-card">
                        <div class="word-header">
                            <div class="word-title">${item.word}</div>
                            <div class="word-level ${levelClass}">${levelText}</div>
                        </div>
                        <div class="word-definition">${item.definition}</div>
                        <div class="word-next">下次复习：<strong>${item.next}</strong></div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
            
            // 更新统计
            document.getElementById('total-words').textContent = vocabularyData.length;
            document.getElementById('mastered-words').textContent = vocabularyData.filter(w => w.lvl === 4).length;
            document.getElementById('learning-words').textContent = vocabularyData.filter(w => w.lvl < 4).length;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', generateCards);
    </script>
</body>
</html>
