<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 欧洲地图 - V13 国旗图片版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .lbl {
            position: absolute;
            background: rgba(14, 165, 233, 0.95);
            color: white;
            padding: 4px 9px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -150%);
            display: none;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }
        .lbl .cn { font-size: 13px; font-weight: 700; display: block; margin-bottom: 1px; }
        .lbl .fr { font-size: 9px; opacity: 0.9; font-style: italic; }
        
        /* 国旗 - 使用图片 */
        .flag {
            position: absolute;
            width: 32px;
            height: 24px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 9998;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 3px;
        }
        .flag.show { display: block !important; }
        .flag.big { width: 48px; height: 36px; }
        
        .hd { position: absolute; top: 0; left: 0; right: 0; padding: 12px 18px; background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%); pointer-events: auto; }
        .hd h1 { color: #fff; font-size: 16px; }
        .hd small { font-size: 10px; opacity: 0.7; color: #fff; }
        
        .ctrl { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; flex-wrap: wrap; justify-content: center; }
        .btn { background: rgba(14, 165, 233, 0.95); color: #fff; border: none; padding: 10px 15px; border-radius: 18px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn:active { transform: scale(0.96); }
        .btn.gray { background: rgba(100,100,100,0.7); }
        .btn.green { background: rgba(34, 197, 94, 0.9); }
        
        .zinfo { position: absolute; bottom: 75px; left: 15px; background: rgba(0,0,0,0.85); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 11px; pointer-events: none; }
        
        .tgl { position: absolute; top: 65px; left: 15px; background: rgba(34, 197, 94, 0.9); color: #fff; padding: 6px 11px; border-radius: 14px; font-size: 11px; font-weight: 600; pointer-events: auto; cursor: pointer; }
        .tgl.off { background: rgba(100,100,100,0.7); }
        
        .tgl2 { position: absolute; top: 65px; left: 105px; background: rgba(34, 197, 94, 0.9); color: #fff; padding: 6px 11px; border-radius: 14px; font-size: 11px; font-weight: 600; pointer-events: auto; cursor: pointer; }
        .tgl2.off { background: rgba(100,100,100,0.7); }
        
        .lst { position: absolute; top: 105px; right: 12px; background: rgba(0,0,0,0.95); border-radius: 10px; padding: 10px; max-height: calc(100% - 200px); overflow-y: auto; pointer-events: auto; border: 1px solid rgba(255,255,255,0.15); min-width: 170px; display: none; }
        .lst h3 { color: #0ea5e9; font-size: 11px; margin-bottom: 6px; }
        .lst .itm { padding: 6px 8px; margin: 2px 0; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .lst .itm:hover { background: rgba(14, 165, 233, 0.25); }
        .lst .cn { font-weight: 600; color: #fff; }
        .lst .fr { font-size: 9px; color: #94a3b8; font-style: italic; }
        
        #ld { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10000; }
    </style>
</head>
<body>
    <div id="ld"><h2>🌍 加载中...</h2></div>
    
    <div id="ui">
        <div class="hd"><h1>🇪🇺 欧洲国家学习</h1><small>Apprendre les pays européens</small></div>
        
        <div class="tgl" id="tgl1" onclick="tgl1()">🏷️ 标签：<span id="st1">ON</span></div>
        <div class="tgl2" id="tgl2" onclick="tgl2()">🚩 国旗：<span id="st2">ON</span></div>
        <div class="zinfo">🔍 <span id="zm">100%</span></div>
        
        <div class="ctrl">
            <button class="btn green" onclick="z(0.7)">🔍 放大</button>
            <button class="btn" onclick="z(1.4)">🔎 缩小</button>
            <button class="btn gray" onclick="rst()">🔄 重置</button>
            <button class="btn gray" onclick="tlst()">📋 列表</button>
        </div>
        
        <div class="lst" id="lst"><h3>🇪🇺 国家列表</h3><div id="lc"></div></div>
        <div id="lbls"></div>
        <div id="flags"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 国旗图片 URL (使用 flagcdn.com)
        const FLAGS = {
            'France': 'https://flagcdn.com/w80/fr.png',
            'Allemagne': 'https://flagcdn.com/w80/de.png',
            'Italie': 'https://flagcdn.com/w80/it.png',
            'Espagne': 'https://flagcdn.com/w80/es.png',
            'Portugal': 'https://flagcdn.com/w80/pt.png',
            'Royaume-Uni': 'https://flagcdn.com/w80/gb.png',
            'Belgique': 'https://flagcdn.com/w80/be.png',
            'Pays-Bas': 'https://flagcdn.com/w80/nl.png',
            'Suisse': 'https://flagcdn.com/w80/ch.png',
            'Autriche': 'https://flagcdn.com/w80/at.png',
            'Pologne': 'https://flagcdn.com/w80/pl.png',
            'Tchéquie': 'https://flagcdn.com/w80/cz.png',
            'Suède': 'https://flagcdn.com/w80/se.png',
            'Norvège': 'https://flagcdn.com/w80/no.png',
            'Danemark': 'https://flagcdn.com/w80/dk.png',
            'Finlande': 'https://flagcdn.com/w80/fi.png',
            'Grèce': 'https://flagcdn.com/w80/gr.png',
            'Irlande': 'https://flagcdn.com/w80/ie.png',
            'Roumanie': 'https://flagcdn.com/w80/ro.png',
            'Hongrie': 'https://flagcdn.com/w80/hu.png',
            'Croatie': 'https://flagcdn.com/w80/hr.png',
            'Slovaquie': 'https://flagcdn.com/w80/sk.png',
            'Bulgarie': 'https://flagcdn.com/w80/bg.png',
            'Serbie': 'https://flagcdn.com/w80/rs.png',
            'Ukraine': 'https://flagcdn.com/w80/ua.png'
        };

        const C = [
            { cn: "法国", fr: "France", lat: 46.60, lng: 1.89 },
            { cn: "德国", fr: "Allemagne", lat: 51.17, lng: 10.45 },
            { cn: "意大利", fr: "Italie", lat: 41.87, lng: 12.57 },
            { cn: "西班牙", fr: "Espagne", lat: 40.46, lng: -3.75 },
            { cn: "葡萄牙", fr: "Portugal", lat: 39.40, lng: -8.22 },
            { cn: "英国", fr: "Royaume-Uni", lat: 55.38, lng: -3.44 },
            { cn: "比利时", fr: "Belgique", lat: 50.50, lng: 4.47 },
            { cn: "荷兰", fr: "Pays-Bas", lat: 52.13, lng: 5.29 },
            { cn: "瑞士", fr: "Suisse", lat: 46.82, lng: 8.23 },
            { cn: "奥地利", fr: "Autriche", lat: 47.52, lng: 14.55 },
            { cn: "波兰", fr: "Pologne", lat: 51.92, lng: 19.15 },
            { cn: "捷克", fr: "Tchéquie", lat: 49.82, lng: 15.47 },
            { cn: "瑞典", fr: "Suède", lat: 60.13, lng: 18.64 },
            { cn: "挪威", fr: "Norvège", lat: 60.47, lng: 8.47 },
            { cn: "丹麦", fr: "Danemark", lat: 56.26, lng: 9.50 },
            { cn: "芬兰", fr: "Finlande", lat: 61.92, lng: 25.75 },
            { cn: "希腊", fr: "Grèce", lat: 39.07, lng: 21.82 },
            { cn: "爱尔兰", fr: "Irlande", lat: 53.41, lng: -8.24 },
            { cn: "罗马尼亚", fr: "Roumanie", lat: 45.94, lng: 24.97 },
            { cn: "匈牙利", fr: "Hongrie", lat: 47.16, lng: 19.50 },
            { cn: "克罗地亚", fr: "Croatie", lat: 45.10, lng: 15.20 },
            { cn: "斯洛伐克", fr: "Slovaquie", lat: 48.67, lng: 19.70 },
            { cn: "保加利亚", fr: "Bulgarie", lat: 42.73, lng: 25.49 },
            { cn: "塞尔维亚", fr: "Serbie", lat: 44.02, lng: 21.01 },
            { cn: "乌克兰", fr: "Ukraine", lat: 48.38, lng: 31.17 }
        ];

        let scn, cam, rnd, earth, clouds;
        let mks = [], lbls = [], flags = [];
        let drag = false, pm = { x: 0, y: 0 };
        let lon = 0, lat = 0, dist = 5;
        let lblOn = true, flagOn = true;

        function init() {
            scn = new THREE.Scene();
            cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
            cam.position.z = dist;
            
            rnd = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            rnd.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(rnd.domElement);
            
            // Stars
            const sg = new THREE.BufferGeometry();
            const sp = new Float32Array(3000 * 3);
            for(let i = 0; i < 3000 * 3; i++) sp[i] = (Math.random() - 0.5) * 300;
            sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
            scn.add(new THREE.Points(sg, new THREE.PointsMaterial({ size: 0.15, color: 0xffffff, transparent: true, opacity: 0.8 })));
            
            // Earth
            const ld = new THREE.TextureLoader();
            ld.crossOrigin = 'anonymous';
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(1, 64, 64),
                new THREE.MeshPhongMaterial({
                    map: ld.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                    bumpScale: 0.05,
                    specular: new THREE.Color(0x333333),
                    shininess: 10
                })
            );
            scn.add(earth);
            
            // Clouds
            clouds = new THREE.Mesh(
                new THREE.SphereGeometry(1.015, 64, 64),
                new THREE.MeshPhongMaterial({
                    map: ld.load('https://unpkg.com/three-globe/example/img/earth-clouds.png'),
                    transparent: true,
                    opacity: 0.35,
                    depthWrite: false
                })
            );
            scn.add(clouds);
            
            // Lights
            scn.add(new THREE.AmbientLight(0x444444));
            const sun = new THREE.DirectionalLight(0xffffff, 1.3);
            sun.position.set(5, 3, 5);
            scn.add(sun);
            
            // Markers, Labels & Flags
            C.forEach((c, i) => {
                const p = ll2v(c.lat, c.lng, 1.03);
                
                // 标记点
                const mk = new THREE.Mesh(
                    new THREE.SphereGeometry(0.012, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.9 })
                );
                mk.position.copy(p);
                mk.userData = c;
                earth.add(mk);
                mks.push(mk);
                
                // 标签
                const lbl = document.createElement('div');
                lbl.className = 'lbl';
                lbl.innerHTML = `<span class="cn">${c.cn}</span><span class="fr">${c.fr}</span>`;
                lbl.style.display = 'none';
                document.getElementById('lbls').appendChild(lbl);
                lbls.push({ el: lbl, pos: p.clone(), c: c });
                
                // 国旗 - 使用 img 标签
                const fl = document.createElement('img');
                fl.className = 'flag';
                fl.src = FLAGS[c.fr];
                fl.alt = c.cn;
                fl.style.display = 'none';
                document.getElementById('flags').appendChild(fl);
                flags.push({ el: fl, pos: p.clone(), c: c });
            });
            
            // List
            document.getElementById('lc').innerHTML = C.map(c => 
                `<div class="itm" onclick="fc('${c.fr}')"><span class="cn">${c.cn}</span><span class="fr">${c.fr}</span></div>`
            ).join('');
            
            // Events
            const cv = rnd.domElement;
            cv.addEventListener('touchstart', ts, { passive: false });
            cv.addEventListener('touchmove', tm, { passive: false });
            cv.addEventListener('touchend', () => drag = false);
            cv.addEventListener('mousedown', e => { drag = true; pm = { x: e.clientX, y: e.clientY }; });
            cv.addEventListener('mousemove', e => {
                if (!drag) return;
                lon -= (e.clientX - pm.x) * 0.3;
                lat += (e.clientY - pm.y) * 0.3;
                lat = Math.max(-85, Math.min(85, lat));
                pm = { x: e.clientX, y: e.clientY };
            });
            cv.addEventListener('mouseup', () => drag = false);
            cv.addEventListener('wheel', e => { e.preventDefault(); dist += e.deltaY * 0.005; dist = Math.max(1.2, Math.min(15, dist)); uz(); }, { passive: false });
            cv.addEventListener('dblclick', rst);
            window.addEventListener('resize', () => {
                cam.aspect = window.innerWidth / window.innerHeight;
                cam.updateProjectionMatrix();
                rnd.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.getElementById('ld').style.display = 'none';
            uz();
            animate();
        }

        function ll2v(lat, lng, r) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lng + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }

        function ts(e) {
            e.preventDefault();
            if (e.touches.length === 1) { drag = true; pm = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
            else if (e.touches.length === 2) {
                const d0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const z0 = dist;
                const h = e2 => {
                    e2.preventDefault();
                    if (e2.touches.length !== 2) { window.removeEventListener('touchmove', h); return; }
                    const d1 = Math.hypot(e2.touches[0].clientX - e2.touches[1].clientX, e2.touches[0].clientY - e2.touches[1].clientY);
                    dist = z0 + (d0 - d1) * 0.01;
                    dist = Math.max(1.2, Math.min(15, dist));
                    uz();
                };
                window.addEventListener('touchmove', h, { passive: false });
            }
        }

        function tm(e) {
            if (!drag || e.touches.length !== 1) return;
            e.preventDefault();
            lon -= (e.touches[0].clientX - pm.x) * 0.3;
            lat += (e.touches[0].clientY - pm.y) * 0.3;
            lat = Math.max(-85, Math.min(85, lat));
            pm = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        function z(f) { dist *= f; dist = Math.max(1.2, Math.min(15, dist)); uz(); }
        function uz() { document.getElementById('zm').textContent = Math.round((5 / dist) * 100) + '%'; }
        
        function tgl1() { lblOn = !lblOn; document.getElementById('tgl1').classList.toggle('off', !lblOn); document.getElementById('st1').textContent = lblOn ? 'ON' : 'OFF'; }
        function tgl2() { flagOn = !flagOn; document.getElementById('tgl2').classList.toggle('off', !flagOn); document.getElementById('st2').textContent = flagOn ? 'ON' : 'OFF'; }
        function tlst() { const l = document.getElementById('lst'); l.style.display = l.style.display === 'block' ? 'none' : 'block'; }
        
        function fc(fr) {
            const c = C.find(x => x.fr === fr);
            if (!c) return;
            lon = -c.lng * 0.8;
            lat = -c.lat * 0.5;
            dist = 1.6;
            uz();
            setTimeout(() => tlst(), 250);
        }
        
        function rst() { lon = 0; lat = 0; dist = 5; uz(); }

        function animate() {
            requestAnimationFrame(animate);
            
            if (!drag) { lon += 0.015; }
            
            // Update camera
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            cam.position.x = -dist * Math.sin(phi) * Math.cos(theta);
            cam.position.y = dist * Math.cos(phi);
            cam.position.z = dist * Math.sin(phi) * Math.sin(theta);
            cam.lookAt(0, 0, 0);
            
            const zoom = 5 / dist;
            const showLbl = zoom > 1.15 && lblOn;
            const showFlag = zoom > 1.25 && flagOn;
            const bigFlag = zoom > 2.5;
            
            // Update labels
            lbls.forEach(l => {
                const wp = l.pos.clone().applyEuler(earth.rotation);
                const sp = wp.clone().project(cam);
                const nd = wp.clone().normalize();
                const cd = cam.position.clone().normalize();
                const front = nd.dot(cd) > 0.1;
                const inv = Math.abs(sp.x) < 0.92 && Math.abs(sp.y) < 0.92;
                
                if (showLbl && front && inv) {
                    l.el.style.display = 'block';
                    l.el.style.left = ((sp.x * 0.5 + 0.5) * window.innerWidth) + 'px';
                    l.el.style.top = ((-sp.y * 0.5 + 0.5) * window.innerHeight) + 'px';
                } else {
                    l.el.style.display = 'none';
                }
            });
            
            // Update flags
            flags.forEach(f => {
                const wp = f.pos.clone().applyEuler(earth.rotation);
                const sp = wp.clone().project(cam);
                const nd = wp.clone().normalize();
                const cd = cam.position.clone().normalize();
                const front = nd.dot(cd) > 0.1;
                const inv = Math.abs(sp.x) < 0.92 && Math.abs(sp.y) < 0.92;
                
                if (showFlag && front && inv) {
                    f.el.style.display = 'block';
                    f.el.classList.add('show');
                    f.el.style.left = ((sp.x * 0.5 + 0.5) * window.innerWidth) + 'px';
                    f.el.style.top = ((-sp.y * 0.5 + 0.5) * window.innerHeight) + 'px';
                    f.el.classList.toggle('big', bigFlag);
                } else {
                    f.el.style.display = 'none';
                    f.el.classList.remove('show');
                }
            });
            
            rnd.render(scn, cam);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
