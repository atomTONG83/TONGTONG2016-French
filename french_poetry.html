<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poésie Française · 法语诗歌学习</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Dancing+Script:wght@400;700&display=swap');
        :root {
            --bg: #030712;
            --primary: #0ea5e9;
            --secondary: #818cf8;
            --accent: #fbbf24;
            --glass: rgba(15, 23, 42, 0.6);
            --border: rgba(56, 189, 248, 0.2);
            --poetry-bg: rgba(139, 92, 246, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .badge {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 4px 15px;
            display: inline-block;
            margin-bottom: 15px;
        }
        h1 {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1rem;
            color: #64748b;
            letter-spacing: 2px;
        }
        
        .poem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .poem-card {
            background: var(--poetry-bg);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 25px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .poem-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.2);
        }
        .poem-card::before {
            content: '📜';
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 2rem;
            opacity: 0.3;
        }
        .poem-title {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 10px;
        }
        .poem-author {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 15px;
            font-style: italic;
        }
        .poem-preview {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 20px;
            font-size: 0.7rem;
            color: #a78bfa;
            margin-top: 15px;
            font-family: 'Orbitron';
            letter-spacing: 1px;
        }
        
        .poem-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            max-width: 700px;
            margin: 40px auto;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            color: var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }
        .close-btn:hover { color: var(--accent); }
        .modal-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--accent);
            text-align: center;
            margin-bottom: 10px;
        }
        .modal-author {
            text-align: center;
            font-size: 1rem;
            color: #94a3b8;
            font-style: italic;
            margin-bottom: 30px;
        }
        .modal-poem {
            font-size: 1.1rem;
            line-height: 2;
            color: #e2e8f0;
            white-space: pre-line;
            text-align: center;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 700;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }
        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #000;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(14, 165, 233, 0.4);
        }
        
        .stats {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }
        .stats h3 {
            font-family: 'Orbitron';
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }
        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-number {
            font-family: 'Orbitron';
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        
        .back-link {
            text-align: center;
            margin-top: 30px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: 'Orbitron';
            transition: 0.3s;
        }
        .back-link a:hover {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding-bottom: 40px;
            color: #334155;
            font-size: 0.6rem;
            letter-spacing: 3px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <header>
            <div class="badge">📚 POÉSIE FRANÇAISE</div>
            <h1>🎭 法语诗歌学习</h1>
            <p class="subtitle">CM1 2026 · École Élémentaire</p>
        </header>

        <div class="stats">
            <h3>📊 学习统计</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="poem-count">0</div>
                    <div class="stat-label">诗歌数量</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="words-count">0</div>
                    <div class="stat-label">总词汇</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">CM1</div>
                    <div class="stat-label">年级</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">🇫🇷</div>
                    <div class="stat-label">法语</div>
                </div>
            </div>
        </div>

        <div class="poem-grid" id="poem-grid">
            <!-- 诗歌卡片将通过 JavaScript 动态加载 -->
        </div>

        <div class="back-link">
            <a href="exam_hub.html">← RETOUR AU CENTRE DE RÉVISION 返回复习中心</a>
        </div>

        <footer>V3.8 · © ATOM TONG 2026 · POÉSIE FRANÇAISE</footer>
    </div>

    <!-- 诗歌详情弹窗 -->
    <div class="poem-modal" id="poem-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modal-title"></h2>
            <p class="modal-author" id="modal-author"></p>
            <div class="modal-poem" id="modal-poem"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closeModal()">✅ J'AI FINI DE LIRE</button>
            </div>
        </div>
    </div>

    <script>
        // 诗歌数据库 - 待填充
        const poems = [
            // 等待用户提供诗歌内容后填充
            // 格式示例:
            // {
            //     title: "Le Corbeau et le Renard",
            //     author: "Jean de La Fontaine",
            //     content: "Maître Corbeau, sur un arbre perché,\nTenait en son bec un fromage...",
            //     tag: "Fable"
            // }
        ];

        // 渲染诗歌卡片
        function renderPoems() {
            const grid = document.getElementById('poem-grid');
            const countEl = document.getElementById('poem-count');
            
            if (poems.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #64748b;">
                        <div style="font-size: 3rem; margin-bottom: 20px;">📜</div>
                        <p style="font-size: 1.2rem;">暂无诗歌</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">诗歌内容即将上线...</p>
                    </div>
                `;
                countEl.textContent = '0';
                return;
            }
            
            grid.innerHTML = poems.map((poem, index) => `
                <div class="poem-card" onclick="openPoem(${index})">
                    <h3 class="poem-title">${poem.title}</h3>
                    <p class="poem-author">${poem.author}</p>
                    <p class="poem-preview">${poem.content.substring(0, 100)}...</p>
                    <span class="tag">${poem.tag || 'Poésie'}</span>
                </div>
            `).join('');
            
            countEl.textContent = poems.length;
        }

        // 打开诗歌详情
        function openPoem(index) {
            const poem = poems[index];
            document.getElementById('modal-title').textContent = poem.title;
            document.getElementById('modal-author').textContent = poem.author;
            document.getElementById('modal-poem').textContent = poem.content;
            document.getElementById('poem-modal').style.display = 'block';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('poem-modal').style.display = 'none';
        }

        // 点击弹窗外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('poem-modal');
            if (event.target === modal) {
                closeModal();
            }
        }

        // 页面加载时渲染
        renderPoems();
    </script>
</body>
</html>
