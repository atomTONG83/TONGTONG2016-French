<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>рҹҮЁрҹҮі жұүиҜӯеӯҰд№  / Chinois</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root {
            --bg: #030712;
            --primary: #ef4444;
            --secondary: #f97316;
            --accent: #fbbf24;
            --glass: rgba(239, 68, 68, 0.1);
            --border: rgba(239, 68, 68, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(239, 68, 68, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(239, 68, 68, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: rotateX(45deg);
            animation: moveGrid 20s linear infinite;
        }
        
        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 500px; }
        }
        
        .container { max-width: 600px; margin: 0 auto; }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        .week-badge {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 5px 18px;
            display: inline-block;
            margin-bottom: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 20px;
        }
        
        h1 {
            font-family: 'Orbitron';
            font-weight: 900;
            font-size: 1.9rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            background: linear-gradient(135deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h1 small {
            font-size: 1rem;
            opacity: 0.7;
            display: block;
            margin-top: 8px;
            -webkit-text-fill-color: #94a3b8;
        }
        
        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 4px;
            color: var(--primary);
            border-left: 3px solid var(--primary);
            padding-left: 15px;
            margin: 35px 0 18px;
            text-transform: uppercase;
        }
        
        .lesson-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 18px;
            backdrop-filter: blur(10px);
            animation: slideIn 0.5s ease-out forwards;
            position: relative;
            overflow: hidden;
        }
        
        .lesson-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }
        
        @keyframes slideIn {
            from { transform: translateX(-30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .lesson-title {
            font-family: 'Orbitron';
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .lesson-date {
            font-size: 0.75rem;
            color: #64748b;
        }
        
        .lesson-section {
            margin-bottom: 14px;
        }
        
        .lesson-section h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .lesson-section ul {
            list-style: none;
            padding-left: 5px;
        }
        
        .lesson-section li {
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 4px;
            padding-left: 12px;
            position: relative;
        }
        
        .lesson-section li::before {
            content: 'вҖў';
            color: var(--primary);
            position: absolute;
            left: 0;
            font-weight: bold;
        }
        
        .homework-item {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .homework-item:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--primary);
        }
        
        .homework-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        
        .homework-checkbox.checked {
            background: var(--primary);
        }
        
        .homework-checkbox.checked::after {
            content: 'вң“';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        .homework-text {
            flex: 1;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        
        .homework-text.completed {
            text-decoration: line-through;
            color: #64748b;
        }
        
        .teacher-notes {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(249, 115, 22, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 14px;
            margin-top: 16px;
        }
        
        .teacher-notes h3 {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .teacher-notes p {
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.5;
        }
        
        .parent-tasks {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed rgba(239, 68, 68, 0.3);
        }
        
        .parent-tasks h4 {
            font-size: 0.75rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .task-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .task-tag {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #64748b;
        }
        
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transition: all 0.2s;
        }
        
        .add-btn:active {
            transform: scale(0.96);
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding-bottom: 40px;
            color: #334155;
            font-size: 0.65rem;
            letter-spacing: 2px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="container">
        <header>
            <div class="week-badge" id="weekBadge">2026 е№ҙ 3 жңҲ з¬¬ 11 е‘Ё</div>
            <h1>рҹҮЁрҹҮі жұүиҜӯеӯҰд№ <small>Chinois / Chinese Learning</small></h1>
        </header>
        
        <div class="section-title">жң¬е‘ЁиҜҫзЁӢ / LeГ§ons cette semaine</div>
        
        <div id="lessonsContainer">
            <!-- иҜҫзЁӢеҚЎзүҮдјҡеҠЁжҖҒеҠ иҪҪеҲ°иҝҷйҮҢ -->
        </div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="icon">рҹ“ҡ</div>
            <p>жң¬е‘ЁиҝҳжІЎжңүиҜҫзЁӢи®°еҪ•</p>
            <button class="add-btn" onclick="addLesson()">+ ж·»еҠ з¬¬дёҖе ӮиҜҫ</button>
        </div>
        
        <footer>V1.0 | В© TONGTONG's SPACE 2026 | жұүиҜӯеӯҰд№ </footer>
    </div>

    <script>
        // ж•°жҚ®з»“жһ„
        const chineseLearningData = {
            week: "2026-W11",
            weekLabel: "2026 е№ҙ 3 жңҲ з¬¬ 11 е‘Ё",
            lessons: [
                {
                    id: 1,
                    date: "2026-03-11",
                    day: "е‘Ёдёү",
                    institution: "LingoAce",
                    type: "зҪ‘иҜҫ",
                    time: "16:00",
                    content: {
                        recognizeChars: "29 дёӘй«ҳйў‘еӯ—пјҡзҰ»гҖҒйЈҹгҖҒе·®гҖҒиғҪгҖҒзҺҜгҖҒдҝқгҖҒжҠӨгҖҒжһҒгҖҒеӣ гҖҒеҠҹгҖҒжү”гҖҒз®ҖгҖҒеҚ•...",
                        recognizeWords: "еҢ—жһҒгҖҒзҰ»ејҖгҖҒйЈҹзү©гҖҒдҝқжҠӨгҖҒзҺҜеўғгҖҒз”ұдәҺгҖҒжҲҗеҠҹгҖҒз®ҖеҚ•гҖҒжү”жҺү",
                        writeChars: "15 дёӘжұүеӯ—пјҡи§ҒгҖҒдёҪгҖҒжЈ®гҖҒе…ігҖҒй—ӯгҖҒд»ҺгҖҒдј—гҖҒзӮҺгҖҒеңӯгҖҒзЈҠгҖҒе“ҒгҖҒжҷ¶гҖҒжЈ®гҖҒж·јгҖҒз„ұ",
                        expressions: "\"и¶ҠжқҘи¶Ҡ...\"гҖҒ\"жңү...иҝҳжңү...\""
                    },
                    homework: [
                        {
                            id: 1,
                            content: "еҲ¶дҪң"дҝқжҠӨең°зҗғ"е°Ҹд№Ұ",
                            dueDate: "2026-03-18",
                            completed: false
                        }
                    ],
                    teacherNotes: "жң¬иҠӮиҜҫиҜҫеҗҺдҪңдёҡеҫҲйҮҚиҰҒе“ҰпјҢиҫӣиӢҰе®¶й•ҝжҸҗйҶ’з«Ҙз«Ҙе®ҢжҲҗдҪңдёҡ",
                    parentTasks: ["зҰ»ејҖ", "жҲҗеҠҹ", "з”ұдәҺ", "жү”", "еҢ—жһҒ", "з®ҖеҚ•"]
                }
                // еҸҜд»Ҙж·»еҠ жӣҙеӨҡиҜҫзЁӢ
            ]
        };

        // жёІжҹ“иҜҫзЁӢеҚЎзүҮ
        function renderLessons() {
            const container = document.getElementById('lessonsContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (chineseLearningData.lessons.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            container.style.display = 'block';
            emptyState.style.display = 'none';
            
            container.innerHTML = chineseLearningData.lessons.map((lesson, index) => `
                <div class="lesson-card" style="animation-delay: ${index * 0.1}s">
                    <div class="lesson-header">
                        <div>
                            <div class="lesson-title">рҹ“– ${lesson.day}${lesson.type} В· ${lesson.institution}</div>
                            <div class="lesson-date">${lesson.date} ${lesson.time || ''}</div>
                        </div>
                    </div>
                    
                    <div class="lesson-section">
                        <h3>рҹ“– еӯ—иҜҚи®ӨиҜ»</h3>
                        <ul>
                            <li>${lesson.content.recognizeChars}</li>
                            <li>${lesson.content.recognizeWords}</li>
                        </ul>
                    </div>
                    
                    <div class="lesson-section">
                        <h3>вңҚпёҸ еӯ—иҜҚд№ҰеҶҷ</h3>
                        <ul>
                            <li>${lesson.content.writeChars}</li>
                        </ul>
                    </div>
                    
                    <div class="lesson-section">
                        <h3>рҹ’¬ дәӨйҷ…иЎЁиҫҫ</h3>
                        <ul>
                            <li>${lesson.content.expressions}</li>
                        </ul>
                    </div>
                    
                    <div class="lesson-section">
                        <h3>рҹ“қ иҜҫеҗҺдҪңдёҡ</h3>
                        ${lesson.homework.map(hw => `
                            <div class="homework-item" onclick="toggleHomework(${lesson.id}, ${hw.id})">
                                <div class="homework-checkbox ${hw.completed ? 'checked' : ''}"></div>
                                <div class="homework-text ${hw.completed ? 'completed' : ''}">
                                    ${hw.content}
                                    <div style="font-size: 0.7rem; color: #64748b; margin-top: 4px;">
                                        жҲӘжӯўпјҡ${formatDate(hw.dueDate)}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="teacher-notes">
                        <h3>рҹ‘©вҖҚрҹҸ« иҖҒеёҲиҜ„иҜӯ</h3>
                        <p>${lesson.teacherNotes}</p>
                        
                        ${lesson.parentTasks && lesson.parentTasks.length > 0 ? `
                        <div class="parent-tasks">
                            <h4>рҹ’Ў е®¶й•ҝиҜҫдёӢжҸҗй—®</h4>
                            <div class="task-tags">
                                ${lesson.parentTasks.map(task => `<span class="task-tag">${task}</span>`).join('')}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        // еҲҮжҚўдҪңдёҡе®ҢжҲҗзҠ¶жҖҒ
        function toggleHomework(lessonId, homeworkId) {
            const lesson = chineseLearningData.lessons.find(l => l.id === lessonId);
            if (!lesson) return;
            
            const homework = lesson.homework.find(h => h.id === homeworkId);
            if (!homework) return;
            
            homework.completed = !homework.completed;
            saveData();
            renderLessons();
        }

        // ж јејҸеҢ–ж—Ҙжңҹ
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${month}жңҲ${day}ж—Ҙ`;
        }

        // дҝқеӯҳж•°жҚ®еҲ° localStorage
        function saveData() {
            localStorage.setItem('chineseLearningData', JSON.stringify(chineseLearningData));
        }

        // еҠ иҪҪж•°жҚ®
        function loadData() {
            const saved = localStorage.getItem('chineseLearningData');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // еҗҲе№¶ж•°жҚ®пјҢдҝқз•ҷж–°иҜҫзЁӢ
                    if (parsed.lessons && parsed.lessons.length > 0) {
                        // дҝқз•ҷжң¬ең°еӯҳеӮЁзҡ„ж•°жҚ®пјҲз”ЁжҲ·еҸҜиғҪж·»еҠ дәҶж–°иҜҫзЁӢпјү
                        Object.assign(chineseLearningData, parsed);
                    }
                } catch (e) {
                    console.error('еҠ иҪҪж•°жҚ®еӨұиҙҘ:', e);
                }
            }
            // еҰӮжһңиҝҳжҳҜжІЎжңүиҜҫзЁӢпјҢжҳҫзӨәз©әзҠ¶жҖҒ
            if (chineseLearningData.lessons.length === 0) {
                console.log('жІЎжңүиҜҫзЁӢж•°жҚ®');
            } else {
                console.log('еҠ иҪҪдәҶ', chineseLearningData.lessons.length, 'дёӘиҜҫзЁӢ');
            }
        }

        // ж·»еҠ иҜҫзЁӢпјҲеҚ дҪҚеҮҪж•°пјү
        function addLesson() {
            alert('ж·»еҠ иҜҫзЁӢеҠҹиғҪејҖеҸ‘дёӯ...\n\nзӣ®еүҚеҸҜд»ҘйҖҡиҝҮзј–иҫ‘ JSON ж•°жҚ®жүӢеҠЁж·»еҠ иҜҫзЁӢгҖӮ');
        }

        // еҲқе§ӢеҢ–
        document.addEventListener('DOMContentLoaded', () => {
            // йҰ–ж¬Ўи®ҝй—®ж—¶жё…йҷӨж—§ж•°жҚ®пјҢзЎ®дҝқжҳҫзӨәй»ҳи®ӨиҜҫзЁӢ
            const isFirstVisit = !localStorage.getItem('chineseLearningVisited');
            if (isFirstVisit) {
                localStorage.removeItem('chineseLearningData');
                localStorage.setItem('chineseLearningVisited', 'true');
                console.log('йҰ–ж¬Ўи®ҝй—®пјҢдҪҝз”Ёй»ҳи®Өж•°жҚ®');
            }
            
            loadData();
            document.getElementById('weekBadge').textContent = chineseLearningData.weekLabel;
            renderLessons();
            
            // и°ғиҜ•дҝЎжҒҜ
            console.log('иҜҫзЁӢж•°жҚ®:', chineseLearningData);
        });
    </script>
</body>
</html>
