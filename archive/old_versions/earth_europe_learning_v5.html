<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 欧洲地图学习 - V5 标签修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .label {
            position: absolute;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.95), rgba(14, 165, 233, 0.85));
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -100%);
            box-shadow: 0 2px 12px rgba(14, 165, 233, 0.4), 0 0 0 1px rgba(255,255,255,0.2);
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.15s ease-out;
        }
        
        .label.visible { opacity: 1; }
        .label .cn { font-size: 14px; font-weight: 700; display: block; margin-bottom: 2px; }
        .label .fr { font-size: 11px; opacity: 0.9; font-style: italic; }
        
        .header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
            pointer-events: auto;
        }
        
        .title { color: #fff; font-size: 17px; font-weight: 600; }
        .title small { font-size: 11px; opacity: 0.7; display: block; margin-top: 3px; }
        
        .controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        .btn {
            background: rgba(14, 165, 233, 0.9);
            color: #fff;
            border: none;
            padding: 11px 18px;
            border-radius: 22px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 3px 12px rgba(14, 165, 233, 0.3);
        }
        .btn:active { transform: scale(0.96); }
        .btn.secondary { background: rgba(255,255,255,0.15); }
        
        .zoom-info {
            position: absolute;
            bottom: 85px;
            left: 18px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 7px 11px;
            border-radius: 7px;
            font-size: 11px;
            pointer-events: none;
        }
        
        .toggle {
            position: absolute;
            top: 75px;
            left: 18px;
            background: rgba(14, 165, 233, 0.9);
            color: #fff;
            padding: 7px 12px;
            border-radius: 18px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: auto;
            cursor: pointer;
        }
        .toggle.off { background: rgba(80,80,80,0.8); }
        
        .list-panel {
            position: absolute;
            top: 75px;
            right: 15px;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            padding: 12px;
            max-height: calc(100% - 180px);
            overflow-y: auto;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 185px;
            display: none;
        }
        .list-panel h3 { color: #0ea5e9; font-size: 12px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .list-item { padding: 7px 9px; margin: 3px 0; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .list-item:hover { background: rgba(14, 165, 233, 0.2); }
        .list-item .cn { font-weight: 600; color: #fff; }
        .list-item .fr { font-size: 10px; color: #94a3b8; font-style: italic; }
        
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 1000;
        }
        #loading h2 { font-size: 22px; margin-bottom: 8px; }
        #loading p { font-size: 13px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="loading"><h2>🌍 加载中...</h2><p>Chargement...</p></div>
    
    <div id="ui">
        <div class="header">
            <div class="title">🇪🇺 欧洲国家学习<small>Apprendre les pays européens</small></div>
        </div>
        
        <div class="toggle" id="toggleLabels" onclick="toggleLabels()">🏷️ 标签：<span id="labelStatus">ON</span></div>
        <div class="zoom-info">🔍 <span id="zoomText">100%</span></div>
        
        <div class="controls">
            <button class="btn" onclick="zoom(0.8)">🔍 放大</button>
            <button class="btn" onclick="zoom(1.25)">🔎 缩小</button>
            <button class="btn secondary" onclick="reset()">🔄 重置</button>
            <button class="btn secondary" onclick="toggleList()">📋 列表</button>
        </div>
        
        <div class="list-panel" id="listPanel">
            <h3>🇪🇺 欧洲国家</h3>
            <div id="listContent"></div>
        </div>
        
        <div id="labels"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const countries = [
            { cn: "法国", fr: "France", lat: 46.603354, lng: 1.888334 },
            { cn: "德国", fr: "Allemagne", lat: 51.165691, lng: 10.451526 },
            { cn: "意大利", fr: "Italie", lat: 41.87194, lng: 12.56738 },
            { cn: "西班牙", fr: "Espagne", lat: 40.463667, lng: -3.74922 },
            { cn: "葡萄牙", fr: "Portugal", lat: 39.399872, lng: -8.224454 },
            { cn: "英国", fr: "Royaume-Uni", lat: 55.378051, lng: -3.435973 },
            { cn: "比利时", fr: "Belgique", lat: 50.503887, lng: 4.469936 },
            { cn: "荷兰", fr: "Pays-Bas", lat: 52.132633, lng: 5.291266 },
            { cn: "瑞士", fr: "Suisse", lat: 46.818188, lng: 8.227512 },
            { cn: "奥地利", fr: "Autriche", lat: 47.516231, lng: 14.550072 },
            { cn: "波兰", fr: "Pologne", lat: 51.919438, lng: 19.145136 },
            { cn: "捷克", fr: "Tchéquie", lat: 49.817492, lng: 15.472962 },
            { cn: "瑞典", fr: "Suède", lat: 60.128161, lng: 18.643501 },
            { cn: "挪威", fr: "Norvège", lat: 60.472024, lng: 8.468946 },
            { cn: "丹麦", fr: "Danemark", lat: 56.26392, lng: 9.501785 },
            { cn: "芬兰", fr: "Finlande", lat: 61.92411, lng: 25.748151 },
            { cn: "希腊", fr: "Grèce", lat: 39.074208, lng: 21.824312 },
            { cn: "爱尔兰", fr: "Irlande", lat: 53.41291, lng: -8.24389 },
            { cn: "罗马尼亚", fr: "Roumanie", lat: 45.943161, lng: 24.96676 },
            { cn: "匈牙利", fr: "Hongrie", lat: 47.162494, lng: 19.503304 },
            { cn: "克罗地亚", fr: "Croatie", lat: 45.1, lng: 15.2 },
            { cn: "斯洛伐克", fr: "Slovaquie", lat: 48.669026, lng: 19.699024 },
            { cn: "保加利亚", fr: "Bulgarie", lat: 42.733883, lng: 25.48583 },
            { cn: "塞尔维亚", fr: "Serbie", lat: 44.016521, lng: 21.005859 },
            { cn: "乌克兰", fr: "Ukraine", lat: 48.379433, lng: 31.16558 }
        ];

        let scene, camera, renderer, earth, clouds;
        let markers = [], labelEls = [];
        let isDragging = false, prevMouse = { x: 0, y: 0 };
        let labelsOn = true;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            // Stars
            const starsGeo = new THREE.BufferGeometry();
            const starsPos = new Float32Array(4000 * 3);
            for(let i = 0; i < 4000 * 3; i++) starsPos[i] = (Math.random() - 0.5) * 350;
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 0.12, color: 0xffffff, transparent: true, opacity: 0.85 })));
            
            // Earth
            const loader = new THREE.TextureLoader();
            loader.crossOrigin = 'anonymous';
            
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(1, 96, 96),
                new THREE.MeshPhongMaterial({
                    map: loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                    bumpScale: 0.04,
                    specular: new THREE.Color(0x222222),
                    shininess: 8
                })
            );
            scene.add(earth);
            
            // Clouds
            clouds = new THREE.Mesh(
                new THREE.SphereGeometry(1.012, 96, 96),
                new THREE.MeshPhongMaterial({
                    map: loader.load('https://unpkg.com/three-globe/example/img/earth-clouds.png'),
                    transparent: true,
                    opacity: 0.35,
                    depthWrite: false
                })
            );
            scene.add(clouds);
            
            // Atmosphere
            scene.add(new THREE.Mesh(
                new THREE.SphereGeometry(1.025, 96, 96),
                new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.18, side: THREE.BackSide })
            ));
            
            // Lights
            scene.add(new THREE.AmbientLight(0x444444));
            const sun = new THREE.DirectionalLight(0xffffff, 1.4);
            sun.position.set(5, 3, 5);
            scene.add(sun);
            
            // Markers & Labels
            countries.forEach(c => {
                const pos = latLngToVec(c.lat, c.lng, 1.015);
                
                // Marker dot
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.01, 12, 12),
                    new THREE.MeshBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.9 })
                );
                dot.position.copy(pos);
                dot.userData = c;
                earth.add(dot);
                markers.push(dot);
                
                // Label element
                const label = document.createElement('div');
                label.className = 'label';
                label.innerHTML = `<span class="cn">${c.cn}</span><span class="fr">${c.fr}</span>`;
                document.getElementById('labels').appendChild(label);
                labelEls.push({ el: label, pos: pos.clone(), data: c });
            });
            
            // Country list
            document.getElementById('listContent').innerHTML = countries.map(c => 
                `<div class="list-item" onclick="focus('${c.fr}')"><span class="cn">${c.cn}</span><br><span class="fr">${c.fr}</span></div>`
            ).join('');
            
            // Events
            const c = renderer.domElement;
            c.addEventListener('touchstart', ts, { passive: false });
            c.addEventListener('touchmove', tm, { passive: false });
            c.addEventListener('touchend', () => isDragging = false);
            c.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
            c.addEventListener('mousemove', e => {
                if (!isDragging) return;
                earth.rotation.y += (e.clientX - prevMouse.x) * 0.004;
                earth.rotation.x += (e.clientY - prevMouse.y) * 0.004;
                clouds.rotation.y += (e.clientX - prevMouse.x) * 0.005;
                prevMouse = { x: e.clientX, y: e.clientY };
            });
            c.addEventListener('mouseup', () => isDragging = false);
            c.addEventListener('wheel', e => { e.preventDefault(); camera.position.z += e.deltaY * 0.006; camera.position.z = Math.max(1.25, Math.min(18, camera.position.z)); updateZoom(); }, { passive: false });
            c.addEventListener('dblclick', reset);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            document.getElementById('loading').style.display = 'none';
            updateZoom();
            animate();
        }

        function latLngToVec(lat, lng, r) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lng + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }

        function ts(e) {
            e.preventDefault();
            if (e.touches.length === 1) { isDragging = true; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
            else if (e.touches.length === 2) {
                const d0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const z0 = camera.position.z;
                const handler = e2 => {
                    e2.preventDefault();
                    if (e2.touches.length !== 2) { window.removeEventListener('touchmove', handler); return; }
                    const d1 = Math.hypot(e2.touches[0].clientX - e2.touches[1].clientX, e2.touches[0].clientY - e2.touches[1].clientY);
                    camera.position.z = z0 + (d0 - d1) * 0.012;
                    camera.position.z = Math.max(1.25, Math.min(18, camera.position.z));
                    updateZoom();
                };
                window.addEventListener('touchmove', handler, { passive: false });
            }
        }

        function tm(e) {
            if (!isDragging || e.touches.length !== 1) return;
            e.preventDefault();
            earth.rotation.y += (e.touches[0].clientX - prevMouse.x) * 0.004;
            earth.rotation.x += (e.touches[0].clientY - prevMouse.y) * 0.004;
            clouds.rotation.y += (e.touches[0].clientX - prevMouse.x) * 0.005;
            prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        function zoom(factor) {
            camera.position.z *= factor;
            camera.position.z = Math.max(1.25, Math.min(18, camera.position.z));
            updateZoom();
        }

        function updateZoom() {
            const z = Math.round((5 / camera.position.z) * 100);
            document.getElementById('zoomText').textContent = z + '%';
        }

        function toggleLabels() {
            labelsOn = !labelsOn;
            document.getElementById('toggleLabels').classList.toggle('off', !labelsOn);
            document.getElementById('labelStatus').textContent = labelsOn ? 'ON' : 'OFF';
        }

        function toggleList() {
            const p = document.getElementById('listPanel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function focus(frenchName) {
            const c = countries.find(x => x.fr === frenchName);
            if (!c) return;
            
            const targetRotY = -c.lng * Math.PI / 180;
            const targetRotX = -c.lat * Math.PI / 180;
            
            let progress = 0;
            const animate = () => {
                progress += 0.04;
                if (progress >= 1) {
                    earth.rotation.y = targetRotY;
                    earth.rotation.x = targetRotX;
                    clouds.rotation.y = targetRotY;
                    camera.position.z = 2;
                    updateZoom();
                    return;
                }
                earth.rotation.y += (targetRotY - earth.rotation.y) * 0.05;
                earth.rotation.x += (targetRotX - earth.rotation.x) * 0.05;
                clouds.rotation.y += (targetRotY - clouds.rotation.y) * 0.05;
                if (camera.position.z > 2) camera.position.z -= 0.04;
                updateZoom();
                requestAnimationFrame(animate);
            };
            animate();
            setTimeout(() => toggleList(), 300);
        }

        function reset() {
            earth.rotation.set(0, 0, 0);
            clouds.rotation.set(0, 0, 0);
            camera.position.z = 5;
            updateZoom();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (!isDragging) {
                earth.rotation.y += 0.00025;
                clouds.rotation.y += 0.0003;
            }
            
            // Update labels
            if (labelsOn) {
                const zoom = 5 / camera.position.z;
                const show = zoom > 1.15; // Show at 115% zoom
                
                labelEls.forEach(l => {
                    const v = l.pos.clone();
                    v.project(camera);
                    
                    // Check if on front side
                    const worldPos = v.clone().unproject(camera);
                    const toCamera = camera.position.clone().sub(worldPos).normalize();
                    const normal = worldPos.clone().normalize();
                    const isFront = toCamera.dot(normal) > 0.15;
                    
                    const inView = Math.abs(v.x) < 0.93 && Math.abs(v.y) < 0.93;
                    
                    if (show && isFront && inView) {
                        l.el.style.display = 'block';
                        l.el.style.left = ((v.x * 0.5 + 0.5) * window.innerWidth) + 'px';
                        l.el.style.top = ((-v.y * 0.5 + 0.5) * window.innerHeight) + 'px';
                        
                        const opacity = Math.min(1, (zoom - 1.15) / 0.4);
                        l.el.style.opacity = opacity;
                        l.el.classList.add('visible');
                    } else {
                        l.el.classList.remove('visible');
                        setTimeout(() => { if (!l.el.classList.contains('visible')) l.el.style.display = 'none'; }, 150);
                    }
                });
            } else {
                labelEls.forEach(l => {
                    l.el.style.display = 'none';
                    l.el.classList.remove('visible');
                });
            }
            
            renderer.render(scene, camera);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
