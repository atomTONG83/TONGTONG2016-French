<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌍 欧洲地图学习 - 3D Earth (增强版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Overlay */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
        
        /* Header */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        
        .title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .title small {
            font-size: 12px;
            opacity: 0.7;
            display: block;
        }
        
        /* Country Label */
        .country-label {
            position: absolute;
            background: rgba(14, 165, 233, 0.95);
            color: #fff;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 280px;
            transform: translate(-50%, -100%);
            animation: popIn 0.3s ease-out;
            pointer-events: auto;
        }
        
        @keyframes popIn {
            from { transform: translate(-50%, -80%); opacity: 0; }
            to { transform: translate(-50%, -100%); opacity: 1; }
        }
        
        .country-label .cn {
            font-size: 18px;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }
        
        .country-label .fr {
            font-size: 14px;
            opacity: 0.9;
            font-style: italic;
            display: block;
        }
        
        .country-label .close {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
            line-height: 1;
        }
        
        /* Control Panel */
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        
        .btn {
            background: rgba(14, 165, 233, 0.9);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.95);
            background: rgba(14, 165, 233, 1);
        }
        
        .btn.secondary {
            background: rgba(255,255,255,0.15);
        }
        
        /* Country List */
        .country-list {
            position: absolute;
            top: 80px;
            right: 15px;
            background: rgba(0,0,0,0.85);
            border-radius: 12px;
            padding: 15px;
            max-height: calc(100% - 200px);
            overflow-y: auto;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            min-width: 200px;
        }
        
        .country-list h3 {
            color: #0ea5e9;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .country-item {
            padding: 8px 10px;
            margin: 4px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 13px;
        }
        
        .country-item:hover {
            background: rgba(14, 165, 233, 0.2);
        }
        
        .country-item .cn {
            font-weight: 600;
            color: #fff;
        }
        
        .country-item .fr {
            font-size: 11px;
            color: #94a3b8;
            font-style: italic;
        }
        
        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            text-align: center;
            z-index: 1000;
        }
        
        .loading h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .loading p {
            font-size: 14px;
            opacity: 0.7;
        }
        
        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
        
        /* Zoom indicator */
        .zoom-indicator {
            position: absolute;
            bottom: 90px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>

    <div id="loading" class="loading">

        let scene, camera, renderer, earth, clouds, markers = [], borderLines = [];
        let isDragging = false, previousMousePosition = { x: 0, y: 0 };
        let showLabels = false;
        let currentLabel = null;
        let targetRotation = { x: 0, y: 0 };
        let isAutoRotating = false;

        function init() {
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(
                45, 
                window.innerWidth / window.innerHeight, 
                0.01, 
                1000
            );
            camera.position.z = 5;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);
            
            // Stars
            createStars();
            
            // Earth
            createEarth();
            
            // Country Markers
            createMarkers();
            
            // Border Lines
            createBorderLines();
            
            // Lights
            createLighting();
            
            // Events
            setupEvents();
            
            // Populate country list
            populateCountryList();
            
            // Hide loading
            document.getElementById('loading').style.display = 'none';
            
            // Start animation
            animate();
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 3000;
            const posArray = new Float32Array(starsCount * 3);
            
            for(let i = 0; i < starsCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 300;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starsMaterial = new THREE.PointsMaterial({ 
                size: 0.15, 
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });
            const starsMesh = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starsMesh);
        }

        function createEarth() {
            const textureLoader = new THREE.TextureLoader();
            textureLoader.crossOrigin = 'anonymous';
            
            // Earth sphere
            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
            const earthMaterial = new THREE.MeshPhongMaterial({
                map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'),
                bumpMap: textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg'),
                bumpScale: 0.05,
                specular: new THREE.Color(0x333333),
                shininess: 10
            });
            
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            scene.add(earth);
            
            // Clouds
            const cloudGeometry = new THREE.SphereGeometry(1.02, 64, 64);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                map: textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png'),
                transparent: true,
                opacity: 0.4
            });
            clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
            scene.add(clouds);
            
            // Atmosphere
            const atmosphereGeometry = new THREE.SphereGeometry(1.05, 64, 64);
            const atmosphereMaterial = new THREE.MeshBasicMaterial({
                color: 0x4488ff,
                transparent: true,
                opacity: 0.15,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            scene.add(atmosphere);
        }

        function latLngToVector3(lat, lng, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lng + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            
            return new THREE.Vector3(x, y, z);
        }

        function createMarkers() {
            europeanCountries.forEach(country => {
                const position = latLngToVector3(country.lat, country.lng, 1.03);
                
                // Create marker sphere
                const markerGeometry = new THREE.SphereGeometry(0.015, 16, 16);
                const markerMaterial = new THREE.MeshBasicMaterial({
                    color: country.color,
                    transparent: true,
                    opacity: 0.9
                });
                
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.copy(position);
                marker.userData = country;
                earth.add(marker);
                markers.push(marker);
                
                // Create marker ring
                const ringGeometry = new THREE.RingGeometry(0.02, 0.03, 32);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide
                });
                
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.position.copy(position);
                ring.lookAt(new THREE.Vector3(0, 0, 0));
                earth.add(ring);
            });
        }

        function createBorderLines() {
            europeanCountries.forEach(country => {
                if (!country.borders || country.borders.length < 2) return;
                
                const points = [];
                country.borders.forEach(([lat, lng]) => {
                    const pos = latLngToVector3(lat, lng, 1.031);
                    points.push(pos);
                });
                
                // Close the loop
                if (points.length > 2) {
                    points.push(points[0]);
                }
                
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({
                    color: country.color,
                    transparent: true,
                    opacity: 0.6,
                    linewidth: 2
                });
                
                const line = new THREE.Line(geometry, material);
                earth.add(line);
                borderLines.push({ line, country: country.fr });
            });
        }

        function createLighting() {
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);
            
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(5, 3, 5);
            scene.add(sunLight);
            
            const blueLight = new THREE.PointLight(0x4488ff, 0.5, 20);
            blueLight.position.set(-5, 2, 2);
            scene.add(blueLight);
        }

        function setupEvents() {
            const canvas = renderer.domElement;
            
            // Touch events for iPad
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            canvas.addEventListener('touchend', handleTouchEnd);
            
            // Mouse events for desktop
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', handleMouseUp);
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            canvas.addEventListener('dblclick', handleDoubleClick);
            
            // Window resize
            window.addEventListener('resize', handleResize);
            
            // Click detection for country selection
            canvas.addEventListener('click', handleClick);
        }

        let touchStartDistance = 0;
        let initialCameraZ = 5;

        function handleTouchStart(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                previousMousePosition = { 
                    x: e.touches[0].clientX, 
                    y: e.touches[0].clientY 
                };
            } else if (e.touches.length === 2) {
                touchStartDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialCameraZ = camera.position.z;
            }
        }

        function handleTouchMove(e) {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;
                
                earth.rotation.y += deltaX * 0.005;
                earth.rotation.x += deltaY * 0.005;
                clouds.rotation.y += deltaX * 0.006;
                
                previousMousePosition = { 
                    x: e.touches[0].clientX, 
                    y: e.touches[0].clientY 
                };
            } else if (e.touches.length === 2) {
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                
                const delta = touchStartDistance - currentDistance;
                camera.position.z = initialCameraZ + delta * 0.01;
                camera.position.z = Math.max(1.5, Math.min(15, camera.position.z));
                updateZoomIndicator();
            }
        }

        function handleTouchEnd() {
            isDragging = false;
        }

        function handleMouseDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function handleMouseMove(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            earth.rotation.y += deltaX * 0.005;
            earth.rotation.x += deltaY * 0.005;
            clouds.rotation.y += deltaX * 0.006;
            
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function handleMouseUp() {
            isDragging = false;
        }

        function handleWheel(e) {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.005;
            camera.position.z = Math.max(1.5, Math.min(15, camera.position.z));
            updateZoomIndicator();
        }

        function handleDoubleClick() {
            resetView();
        }

        function handleResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function handleClick(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(markers);
            
            if (intersects.length > 0) {
                const country = intersects[0].object.userData;
                showCountryLabel(country, e.clientX, e.clientY);
            } else {
                hideCountryLabel();
            }
        }

        function showCountryLabel(country, x, y) {
            hideCountryLabel();
            
            const label = document.createElement('div');
            label.className = 'country-label';
            label.innerHTML = `
                <span class="close" onclick="hideCountryLabel()">×</span>
                <span class="cn">${country.cn}</span>
                <span class="fr">${country.fr}</span>
            `;
            label.style.left = x + 'px';
            label.style.top = y + 'px';
            
            document.querySelector('.ui-overlay').appendChild(label);
            currentLabel = label;
        }

        function hideCountryLabel() {
            if (currentLabel) {
                currentLabel.remove();
                currentLabel = null;
            }
        }

        function populateCountryList() {
            const content = document.getElementById('countryListContent');
            content.innerHTML = europeanCountries.map(country => `
                <div class="country-item" onclick="focusOnCountry('${country.fr}')">
                    <span class="cn">${country.cn}</span>
                    <span class="fr">${country.fr}</span>
                </div>
            `).join('');
        }

        function focusOnCountry(frenchName) {
            const country = europeanCountries.find(c => c.fr === frenchName);
            if (!country) return;
            
            // Calculate rotation to bring country to front
            targetRotation.y = -country.lng * (Math.PI / 180);
            targetRotation.x = -country.lat * (Math.PI / 180);
            
            // Smooth rotation animation
            isAutoRotating = true;
            
            // Zoom in closer
            const zoomInterval = setInterval(() => {
                if (camera.position.z > 2) {
                    camera.position.z -= 0.1;
                    updateZoomIndicator();
                } else {
                    clearInterval(zoomInterval);
                }
            }, 16);
            
            // Show label after rotation
            setTimeout(() => {
                const marker = markers.find(m => m.userData.fr === frenchName);
                if (marker) {
                    const vector = marker.position.clone();
                    vector.project(camera);
                    
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
                    
                    showCountryLabel(country, x, y);
                }
                isAutoRotating = false;
            }, 1000);
        }

        function zoomIn() {
            camera.position.z = Math.max(1.5, camera.position.z - 0.5);
            updateZoomIndicator();
        }

        function zoomOut() {
            camera.position.z = Math.min(15, camera.position.z + 0.5);
            updateZoomIndicator();
        }

        function updateZoomIndicator() {
            const zoom = Math.round((5 / camera.position.z) * 100);
            document.getElementById('zoomLevel').textContent = zoom + '%';
        }

        function toggleLabels() {
            showLabels = !showLabels;
            markers.forEach(marker => {
                marker.visible = showLabels;
            });
            borderLines.forEach(bl => {
                bl.line.visible = showLabels;
            });
        }

        function resetView() {
            earth.rotation.x = 0;
            earth.rotation.y = 0;
            clouds.rotation.x = 0;
            clouds.rotation.y = 0;
            camera.position.z = 5;
            hideCountryLabel();
            updateZoomIndicator();
        }

        function toggleList() {
            const list = document.getElementById('countryList');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-rotate to target
            if (isAutoRotating) {
                earth.rotation.y += (targetRotation.y - earth.rotation.y) * 0.05;
                earth.rotation.x += (targetRotation.x - earth.rotation.x) * 0.05;
                clouds.rotation.y += (targetRotation.y - clouds.rotation.y) * 0.05;
            } else if (!isDragging) {
                // Slow auto-rotation when not interacting
                earth.rotation.y += 0.0005;
                clouds.rotation.y += 0.0007;
            }
            
            renderer.render(scene, camera);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
