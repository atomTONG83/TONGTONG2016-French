<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 欧洲地图 - V14 美化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .lbl {
            position: absolute;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.95), rgba(6, 182, 212, 0.9));
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
            transform: translate(-50%, -150%);
            display: none;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }
        .lbl.show { opacity: 1; }
        .lbl .cn { font-size: 14px; font-weight: 700; display: block; margin-bottom: 2px; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        .lbl .fr { font-size: 10px; opacity: 0.95; font-style: italic; }
        
        .flag {
            position: absolute;
            width: 36px;
            height: 27px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 9998;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.4);
            opacity: 0;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }
        .flag.show { display: block !important; opacity: 1; }
        .flag.big { width: 54px; height: 40px; }
        
        .hd { position: absolute; top: 0; left: 0; right: 0; padding: 12px 18px; background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%); pointer-events: auto; }
        .hd h1 { color: #fff; font-size: 16px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .hd small { font-size: 10px; opacity: 0.7; color: #fff; }
        
        .ctrl { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; flex-wrap: wrap; justify-content: center; }
        .btn { 
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.9), rgba(6, 182, 212, 0.9));
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.2);
            padding: 11px 17px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn.gray { background: linear-gradient(135deg, rgba(100,100,100,0.7), rgba(80,80,80,0.7)); }
        .btn.green { background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(22, 163, 74, 0.9)); }
        
        .zinfo { position: absolute; bottom: 75px; left: 15px; background: rgba(0,0,0,0.85); color: #fff; padding: 7px 12px; border-radius: 8px; font-size: 11px; pointer-events: none; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        .tgl { position: absolute; top: 65px; left: 15px; background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(22, 163, 74, 0.9)); color: #fff; padding: 7px 13px; border-radius: 16px; font-size: 11px; font-weight: 600; pointer-events: auto; cursor: pointer; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 2px 10px rgba(34, 197, 94, 0.4); }
        .tgl.off { background: linear-gradient(135deg, rgba(100,100,100,0.7), rgba(80,80,80,0.7)); box-shadow: none; }
        
        .tgl2 { position: absolute; top: 65px; left: 115px; background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(22, 163, 74, 0.9)); color: #fff; padding: 7px 13px; border-radius: 16px; font-size: 11px; font-weight: 600; pointer-events: auto; cursor: pointer; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 2px 10px rgba(34, 197, 94, 0.4); }
        .tgl2.off { background: linear-gradient(135deg, rgba(100,100,100,0.7), rgba(80,80,80,0.7)); box-shadow: none; }
        
        .lst { position: absolute; top: 105px; right: 12px; background: rgba(0,0,0,0.95); border-radius: 12px; padding: 12px; max-height: calc(100% - 200px); overflow-y: auto; pointer-events: auto; border: 1px solid rgba(14, 165, 233, 0.3); min-width: 180px; display: none; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .lst h3 { color: #0ea5e9; font-size: 12px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(14, 165, 233, 0.3); }
        .lst .itm { padding: 8px 10px; margin: 3px 0; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .lst .itm:hover { background: linear-gradient(135deg, rgba(14, 165, 233, 0.3), rgba(6, 182, 212, 0.2)); }
        .lst .cn { font-weight: 600; color: #fff; }
        .lst .fr { font-size: 10px; color: #94a3b8; font-style: italic; }
        
        #ld { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; text-align: center; z-index: 10000; }
        #ld h2 { font-size: 24px; margin-bottom: 8px; text-shadow: 0 2px 20px rgba(14, 165, 233, 0.5); }
        #ld p { font-size: 13px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ld"><h2>🌍 加载中...</h2><p>Chargement de la Terre...</p></div>
    
    <div id="ui">
        <div class="hd"><h1>🇪🇺 欧洲国家学习</h1><small>Apprendre les pays européens</small></div>
        
        <div class="tgl" id="tgl1" onclick="tgl1()">🏷️ 标签：<span id="st1">ON</span></div>
        <div class="tgl2" id="tgl2" onclick="tgl2()">🚩 国旗：<span id="st2">ON</span></div>
        <div class="zinfo">🔍 <span id="zm">100%</span></div>
        
        <div class="ctrl">
            <button class="btn green" onclick="zoomTo(0.7)">🔍 放大</button>
            <button class="btn" onclick="zoomTo(1.4)">🔎 缩小</button>
            <button class="btn gray" onclick="resetView()">🔄 重置</button>
            <button class="btn gray" onclick="toggleList()">📋 列表</button>
        </div>
        
        <div class="lst" id="lst"><h3>🇪🇺 国家列表</h3><div id="lc"></div></div>
        <div id="lbls"></div>
        <div id="flags"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 国旗图片 URL
        const FLAGS = {
            'France': 'https://flagcdn.com/w80/fr.png',
            'Allemagne': 'https://flagcdn.com/w80/de.png',
            'Italie': 'https://flagcdn.com/w80/it.png',
            'Espagne': 'https://flagcdn.com/w80/es.png',
            'Portugal': 'https://flagcdn.com/w80/pt.png',
            'Royaume-Uni': 'https://flagcdn.com/w80/gb.png',
            'Belgique': 'https://flagcdn.com/w80/be.png',
            'Pays-Bas': 'https://flagcdn.com/w80/nl.png',
            'Suisse': 'https://flagcdn.com/w80/ch.png',
            'Autriche': 'https://flagcdn.com/w80/at.png',
            'Pologne': 'https://flagcdn.com/w80/pl.png',
            'Tchéquie': 'https://flagcdn.com/w80/cz.png',
            'Suède': 'https://flagcdn.com/w80/se.png',
            'Norvège': 'https://flagcdn.com/w80/no.png',
            'Danemark': 'https://flagcdn.com/w80/dk.png',
            'Finlande': 'https://flagcdn.com/w80/fi.png',
            'Grèce': 'https://flagcdn.com/w80/gr.png',
            'Irlande': 'https://flagcdn.com/w80/ie.png',
            'Roumanie': 'https://flagcdn.com/w80/ro.png',
            'Hongrie': 'https://flagcdn.com/w80/hu.png',
            'Croatie': 'https://flagcdn.com/w80/hr.png',
            'Slovaquie': 'https://flagcdn.com/w80/sk.png',
            'Bulgarie': 'https://flagcdn.com/w80/bg.png',
            'Serbie': 'https://flagcdn.com/w80/rs.png',
            'Ukraine': 'https://flagcdn.com/w80/ua.png'
        };

        const C = [
            { cn: "法国", fr: "France", lat: 46.60, lng: 1.89 },
            { cn: "德国", fr: "Allemagne", lat: 51.17, lng: 10.45 },
            { cn: "意大利", fr: "Italie", lat: 41.87, lng: 12.57 },
            { cn: "西班牙", fr: "Espagne", lat: 40.46, lng: -3.75 },
            { cn: "葡萄牙", fr: "Portugal", lat: 39.40, lng: -8.22 },
            { cn: "英国", fr: "Royaume-Uni", lat: 55.38, lng: -3.44 },
            { cn: "比利时", fr: "Belgique", lat: 50.50, lng: 4.47 },
            { cn: "荷兰", fr: "Pays-Bas", lat: 52.13, lng: 5.29 },
            { cn: "瑞士", fr: "Suisse", lat: 46.82, lng: 8.23 },
            { cn: "奥地利", fr: "Autriche", lat: 47.52, lng: 14.55 },
            { cn: "波兰", fr: "Pologne", lat: 51.92, lng: 19.15 },
            { cn: "捷克", fr: "Tchéquie", lat: 49.82, lng: 15.47 },
            { cn: "瑞典", fr: "Suède", lat: 60.13, lng: 18.64 },
            { cn: "挪威", fr: "Norvège", lat: 60.47, lng: 8.47 },
            { cn: "丹麦", fr: "Danemark", lat: 56.26, lng: 9.50 },
            { cn: "芬兰", fr: "Finlande", lat: 61.92, lng: 25.75 },
            { cn: "希腊", fr: "Grèce", lat: 39.07, lng: 21.82 },
            { cn: "爱尔兰", fr: "Irlande", lat: 53.41, lng: -8.24 },
            { cn: "罗马尼亚", fr: "Roumanie", lat: 45.94, lng: 24.97 },
            { cn: "匈牙利", fr: "Hongrie", lat: 47.16, lng: 19.50 },
            { cn: "克罗地亚", fr: "Croatie", lat: 45.10, lng: 15.20 },
            { cn: "斯洛伐克", fr: "Slovaquie", lat: 48.67, lng: 19.70 },
            { cn: "保加利亚", fr: "Bulgarie", lat: 42.73, lng: 25.49 },
            { cn: "塞尔维亚", fr: "Serbie", lat: 44.02, lng: 21.01 },
            { cn: "乌克兰", fr: "Ukraine", lat: 48.38, lng: 31.17 }
        ];

        let scn, cam, rnd, earth, clouds, atmosphere, rings;
        let markers = [], lbls = [], flags = [];
        let drag = false, pm = { x: 0, y: 0 };
        let lon = 0, lat = 0, dist = 5;
        let targetDist = 5; // 目标距离，用于平滑缩放
        let lblOn = true, flagOn = true;

        function init() {
            scn = new THREE.Scene();
            cam = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
            cam.position.z = dist;
            
            rnd = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            rnd.setSize(window.innerWidth, window.innerHeight);
            rnd.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(rnd.domElement);
            
            // Stars
            createStars();
            
            // Earth
            createEarth();
            
            // Clouds
            createClouds();
            
            // Atmosphere & Glow
            createAtmosphere();
            
            // Rings (Google Earth style)
            createRings();
            
            // Lights
            scn.add(new THREE.AmbientLight(0x444444));
            const sun = new THREE.DirectionalLight(0xffffff, 1.4);
            sun.position.set(5, 3, 5);
            scn.add(sun);
            
            // Markers, Labels & Flags
            C.forEach((c, i) => {
                const p = latLngToVec(c.lat, c.lng, 1.03);
                
                // 液态玻璃标记点
                const mk = createGlassMarker(p, c);
                earth.add(mk);
                markers.push(mk);
                
                // 标签
                const lbl = document.createElement('div');
                lbl.className = 'lbl';
                lbl.innerHTML = `<span class="cn">${c.cn}</span><span class="fr">${c.fr}</span>`;
                lbl.style.display = 'none';
                document.getElementById('lbls').appendChild(lbl);
                lbls.push({ el: lbl, pos: p.clone(), c: c });
                
                // 国旗
                const fl = document.createElement('img');
                fl.className = 'flag';
                fl.src = FLAGS[c.fr];
                fl.alt = c.cn;
                fl.style.display = 'none';
                document.getElementById('flags').appendChild(fl);
                flags.push({ el: fl, pos: p.clone(), c: c });
            });
            
            // List
            document.getElementById('lc').innerHTML = C.map(c => 
                `<div class="itm" onclick="focusOn('${c.fr}')"><span class="cn">${c.cn}</span><span class="fr">${c.fr}</span></div>`
            ).join('');
            
            // Events
            setupEvents();
            
            document.getElementById('ld').style.display = 'none';
            animate();
        }

        function createStars() {
            const sg = new THREE.BufferGeometry();
            const sp = new Float32Array(4000 * 3);
            for(let i = 0; i < 4000 * 3; i++) sp[i] = (Math.random() - 0.5) * 350;
            sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
            scn.add(new THREE.Points(sg, new THREE.PointsMaterial({ size: 0.12, color: 0xffffff, transparent: true, opacity: 0.9 })));
        }

        function createEarth() {
            const ld = new THREE.TextureLoader();
            ld.crossOrigin = 'anonymous';
            earth = new THREE.Mesh(
                new THREE.SphereGeometry(1, 96, 96),
                new THREE.MeshPhongMaterial({
                    map: ld.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
                    bumpScale: 0.04,
                    specular: new THREE.Color(0x222222),
                    shininess: 12
                })
            );
            scn.add(earth);
        }

        function createClouds() {
            const ld = new THREE.TextureLoader();
            clouds = new THREE.Mesh(
                new THREE.SphereGeometry(1.015, 96, 96),
                new THREE.MeshPhongMaterial({
                    map: ld.load('https://unpkg.com/three-globe/example/img/earth-clouds.png'),
                    transparent: true,
                    opacity: 0.35,
                    depthWrite: false
                })
            );
            scn.add(clouds);
        }

        function createAtmosphere() {
            // 大气层光晕
            const atmoGeo = new THREE.SphereGeometry(1.08, 64, 64);
            const atmoMat = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });
            atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
            scn.add(atmosphere);
        }

        function createRings() {
            // Google Earth 风格的光环
            const ringGeo = new THREE.RingGeometry(1.15, 1.18, 64);
            const ringMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vUv = uv;
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    varying vec2 vUv;
                    void main() {
                        float dist = length(vUv - 0.5) * 2.0;
                        float alpha = 1.0 - smoothstep(0.8, 1.0, dist);
                        float pulse = sin(time * 2.0) * 0.3 + 0.7;
                        vec3 color = vec3(0.2, 0.6, 1.0) * pulse;
                        gl_FragColor = vec4(color, alpha * 0.4);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            rings = new THREE.Mesh(ringGeo, ringMat);
            rings.rotation.x = Math.PI / 2;
            scn.add(rings);
        }

        function createGlassMarker(position, country) {
            // 液态玻璃效果标记点
            const group = new THREE.Group();
            
            // 内层 - 半透明球体
            const innerGeo = new THREE.SphereGeometry(0.015, 16, 16);
            const innerMat = new THREE.MeshPhongMaterial({
                color: 0x0ea5e9,
                transparent: true,
                opacity: 0.7,
                shininess: 100,
                specular: 0xffffff
            });
            const inner = new THREE.Mesh(innerGeo, innerMat);
            group.add(inner);
            
            // 外层 - 光晕
            const outerGeo = new THREE.SphereGeometry(0.022, 16, 16);
            const outerMat = new THREE.MeshBasicMaterial({
                color: 0x0ea5e9,
                transparent: true,
                opacity: 0.2,
                blending: THREE.AdditiveBlending
            });
            const outer = new THREE.Mesh(outerGeo, outerMat);
            group.add(outer);
            
            group.position.copy(position);
            group.userData = country;
            
            // 动画脉冲
            group.userData.pulse = Math.random() * Math.PI * 2;
            
            return group;
        }

        function latLngToVec(lat, lng, r) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lng + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -r * Math.sin(phi) * Math.cos(theta),
                r * Math.cos(phi),
                r * Math.sin(phi) * Math.sin(theta)
            );
        }

        function setupEvents() {
            const cv = rnd.domElement;
            cv.addEventListener('touchstart', ts, { passive: false });
            cv.addEventListener('touchmove', tm, { passive: false });
            cv.addEventListener('touchend', () => drag = false);
            cv.addEventListener('mousedown', e => { drag = true; pm = { x: e.clientX, y: e.clientY }; });
            cv.addEventListener('mousemove', e => {
                if (!drag) return;
                lon -= (e.clientX - pm.x) * 0.3;
                lat += (e.clientY - pm.y) * 0.3;
                lat = Math.max(-85, Math.min(85, lat));
                pm = { x: e.clientX, y: e.clientY };
            });
            cv.addEventListener('mouseup', () => drag = false);
            cv.addEventListener('wheel', e => {
                e.preventDefault();
                zoomTo(e.deltaY > 0 ? 1.1 : 0.9);
            }, { passive: false });
            cv.addEventListener('dblclick', resetView);
            window.addEventListener('resize', () => {
                cam.aspect = window.innerWidth / window.innerHeight;
                cam.updateProjectionMatrix();
                rnd.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function ts(e) {
            e.preventDefault();
            if (e.touches.length === 1) { drag = true; pm = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
            else if (e.touches.length === 2) {
                const d0 = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const z0 = targetDist;
                const h = e2 => {
                    e2.preventDefault();
                    if (e2.touches.length !== 2) { window.removeEventListener('touchmove', h); return; }
                    const d1 = Math.hypot(e2.touches[0].clientX - e2.touches[1].clientX, e2.touches[0].clientY - e2.touches[1].clientY);
                    targetDist = z0 + (d0 - d1) * 0.015;
                    targetDist = Math.max(1.3, Math.min(15, targetDist));
                };
                window.addEventListener('touchmove', h, { passive: false });
            }
        }

        function tm(e) {
            if (!drag || e.touches.length !== 1) return;
            e.preventDefault();
            lon -= (e.touches[0].clientX - pm.x) * 0.3;
            lat += (e.touches[0].clientY - pm.y) * 0.3;
            lat = Math.max(-85, Math.min(85, lat));
            pm = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        function zoomTo(factor) {
            if (factor > 1) {
                targetDist *= factor;
            } else {
                targetDist *= factor;
            }
            targetDist = Math.max(1.3, Math.min(15, targetDist));
        }

        function tgl1() { lblOn = !lblOn; document.getElementById('tgl1').classList.toggle('off', !lblOn); document.getElementById('st1').textContent = lblOn ? 'ON' : 'OFF'; }
        function tgl2() { flagOn = !flagOn; document.getElementById('tgl2').classList.toggle('off', !flagOn); document.getElementById('st2').textContent = flagOn ? 'ON' : 'OFF'; }
        function toggleList() { const l = document.getElementById('lst'); l.style.display = l.style.display === 'block' ? 'none' : 'block'; }
        
        function focusOn(fr) {
            const c = C.find(x => x.fr === fr);
            if (!c) return;
            lon = -c.lng * 0.8;
            lat = -c.lat * 0.5;
            targetDist = 1.8;
            setTimeout(() => toggleList(), 250);
        }
        
        function resetView() { lon = 0; lat = 0; targetDist = 5; }

        function animate() {
            requestAnimationFrame(animate);
            
            if (!drag) { lon += 0.012; }
            
            // 平滑缩放 (lerp)
            dist += (targetDist - dist) * 0.08;
            
            // Update camera
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lon + 180) * Math.PI / 180;
            cam.position.x = -dist * Math.sin(phi) * Math.cos(theta);
            cam.position.y = dist * Math.cos(phi);
            cam.position.z = dist * Math.sin(phi) * Math.sin(theta);
            cam.lookAt(0, 0, 0);
            
            // Update rings animation
            if (rings) {
                rings.material.uniforms.time.value += 0.01;
                rings.rotation.z += 0.001;
            }
            
            // Pulse markers
            markers.forEach(mk => {
                mk.userData.pulse += 0.05;
                const scale = 1 + Math.sin(mk.userData.pulse) * 0.15;
                mk.scale.set(scale, scale, scale);
            });
            
            const zoom = 5 / dist;
            const showLbl = zoom > 1.15 && lblOn;
            const showFlag = zoom > 1.3 && flagOn;
            const bigFlag = zoom > 2.5;
            
            // Update labels
            lbls.forEach(l => {
                const wp = l.pos.clone().applyEuler(earth.rotation);
                const sp = wp.clone().project(cam);
                const nd = wp.clone().normalize();
                const cd = cam.position.clone().normalize();
                const front = nd.dot(cd) > 0.1;
                const inv = Math.abs(sp.x) < 0.92 && Math.abs(sp.y) < 0.92;
                
                if (showLbl && front && inv) {
                    l.el.style.display = 'block';
                    setTimeout(() => l.el.classList.add('show'), 0);
                    l.el.style.left = ((sp.x * 0.5 + 0.5) * window.innerWidth) + 'px';
                    l.el.style.top = ((-sp.y * 0.5 + 0.5) * window.innerHeight) + 'px';
                } else {
                    l.el.classList.remove('show');
                    setTimeout(() => { if (!l.el.classList.contains('show')) l.el.style.display = 'none'; }, 300);
                }
            });
            
            // Update flags
            flags.forEach(f => {
                const wp = f.pos.clone().applyEuler(earth.rotation);
                const sp = wp.clone().project(cam);
                const nd = wp.clone().normalize();
                const cd = cam.position.clone().normalize();
                const front = nd.dot(cd) > 0.1;
                const inv = Math.abs(sp.x) < 0.92 && Math.abs(sp.y) < 0.92;
                
                if (showFlag && front && inv) {
                    f.el.style.display = 'block';
                    setTimeout(() => f.el.classList.add('show'), 0);
                    f.el.style.left = ((sp.x * 0.5 + 0.5) * window.innerWidth) + 'px';
                    f.el.style.top = ((-sp.y * 0.5 + 0.5) * window.innerHeight) + 'px';
                    f.el.classList.toggle('big', bigFlag);
                } else {
                    f.el.classList.remove('show');
                    setTimeout(() => { if (!f.el.classList.contains('show')) f.el.style.display = 'none'; }, 300);
                }
            });
            
            // Update zoom display
            document.getElementById('zm').textContent = Math.round((5 / dist) * 100) + '%';
            
            rnd.render(scn, cam);
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
